<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ROOT ACCESS</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
padding:30px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.tool{
border:1px solid #00ff9c;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.tool:hover{
background:#002b1c;
box-shadow:0 0 10px #00ff9c;
}

a{
color:#00ff9c;
text-decoration:none;
}

</style>
</head>

<body>

<h1>ROOT CYBERSECURITY TOOL DIRECTORY</h1>
<p>100 Open Source Security Tools</p>

<div class="grid" id="tools"></div>

<audio id="clickSound" src="assets/click.mp3"></audio>

const clickSound=document.getElementById("clickSound");

let div=document.createElement("div");
div.className="tool";
div.innerHTML=`<a href="${tool[1]}" target="_blank">${tool[0]}</a>`;
div.onclick=()=>clickSound.play();
container.appendChild(div);
});
